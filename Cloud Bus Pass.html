<!DOCTYPE html>
<!-- saved from url=(0041)https://buss-pass-system.netlify.app/auth -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - CloudPass</title>
    <link rel="stylesheet" href="./Cloud Bus Pass_files/style.css">
    <link rel="stylesheet" href="./Cloud Bus Pass_files/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.1), transparent 40%);
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-light);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
    </style>
</head>
<body>
    
    <!-- Loader -->
    <div id="global-loader" class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card glass">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a class="logo" href="https://buss-pass-system.netlify.app/" style="justify-content: center;">
                    <i class="fa-solid fa-bus"></i> CloudPass
                </a>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab(&#39;login&#39;)">Login</div>
                <div class="auth-tab" onclick="switchTab(&#39;signup&#39;)">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" class="form-control" required="" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" required="" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" class="form-control" required="" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" class="form-control" required="" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" class="form-control" required="" placeholder="Create a password (min 6 chars)" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <!-- Firebase SDKs -->
    <script type="module" src="./Cloud Bus Pass_files/firebase-config.js.download"></script>
    <script type="module" src="./Cloud Bus Pass_files/auth.js.download"></script>
    <script src="./Cloud Bus Pass_files/main.js.download"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }
    </script>
